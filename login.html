<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
</head>
<body>
    <h1>Login Page</h1>
     <header>
        <h1>GlobalTix Booking Portal</h1>
        <p>Your gateway to unforgettable journeys and events</p>
    </header>
     <section>
            <h2>Sign In</h2>
            <p>Please enter your credentials to manage your bookings.</p>
            
            <form action="/login-endpoint" method="POST">
                 <div>
                    <label for="user-email">Email Address</label><br>
                    <input type="email" id="user-email" name="email" placeholder="name@example.com" required autocomplete="email">
                </div>
                
                <br>
                 <div>
                    <label for="user-password">Password</label><br>
                    <input type="password" id="user-password" name="password" placeholder="Enter your password" required minlength="8">
                </div>

                <br>
    
</body>
</html>
