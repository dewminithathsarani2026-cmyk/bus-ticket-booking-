<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Bus Ticket Booking</title>
</head>
<body>
   <header>
        <h1>🎫 GlobalPass Booking Portal</h1>
        <p>Flights, Trains, Concerts, & Movies.</p>
        <nav><strong>Navigate:</strong> <a href="#search">Search</a> | <a href="#schedules">Schedules</a> | <a href="#checkout">Checkout</a></nav>
    </header>
       <hr>
    <main>
        <section id="search">
            <h2>🔍 Search Tickets</h2>
            <form>
                <fieldset>
                    <legend>Preferences</legend>
                    <input type="radio" name="cat" value="flight" checked> <label>✈️ Flight</label>
                    <input type="radio" name="cat" value="concert"> <label>🎸 Concert</label><br><br>
                    <label>From:</label><br><input type="text" required><br>
                    <label>To:</label><br><input type="text" required><br>
                    <label>Date:</label><br><input type="date" required><br>
                    <button type="submit">Search</button>
                </fieldset>
            </form>
        </section>
        <hr>
  

    
</body>
</html>
